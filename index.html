<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 图片生成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #1a1a1a;
            font-size: 24px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #6366f1; }
        button {
            padding: 12px 24px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.2s;
        }
        button:hover { background: #4f46e5; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }
        .result {
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .result img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
        }
        .loading {
            color: #6366f1;
            font-size: 14px;
            padding: 20px;
        }
        .error {
            color: #ef4444;
            font-size: 14px;
            padding: 20px;
            background: #fef2f2;
            border-radius: 8px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI 图片生成</h1>
        <div class="input-group">
            <input type="text" id="prompt" placeholder="输入你想要生成的图片描述..." />
            <button id="generateBtn" onclick="generateImage()">生成</button>
        </div>
        <div class="result" id="result"></div>
    </div>

    <script>
        const API_URL = 'https://value.apiqik.online/v1/images/generations';
        const API_KEY = 'sk-1echjgiGk6xg43oYufvpXIwGxpSjhNd8Hpa2DsB9ZC8j1SQE';

        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                alert('请输入图片描述');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const resultDiv = document.getElementById('result');
            
            // 显示加载状态
            btn.disabled = true;
            btn.textContent = '生成中...';
            resultDiv.innerHTML = '<div class="loading">⏳ 正在生成图片，请稍候...</div>';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'gpt-image-2-flatfee',
                        prompt: prompt,
                        n: 1,
                        size: '1024x1024'
                    })
                });

                if (!response.ok) {
                    throw new Error(`请求失败 (${response.status})`);
                }

                const data = await response.json();
                const imageUrl = data.data?.[0]?.url;

                if (imageUrl) {
                    resultDiv.innerHTML = `<img src="${imageUrl}" alt="${prompt}" />`;
                } else {
                    throw new Error('未获取到图片链接');
                }

            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 生成失败：${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '生成';
            }
        }

        // 支持回车键提交
        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') generateImage();
        });
    </script>
</body>
</html>
